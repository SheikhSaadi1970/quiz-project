<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4ff; padding: 30px; }
        .container { max-width: 700px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #667eea; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #e0e0e0; }
        th { background: #667eea; color: white; }
        .rank-1 { background: #fff3cd; }
        .rank-2 { background: #e8f4f8; }
        .rank-3 { background: #f0e6d2; }
        .btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #667eea; color: white; text-decoration: none; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 Leaderboard</h1>
        <table>
            <tr>
                <th>Rank</th>
                <th>Name</th>
                <th>Score</th>
                <th>Percentage</th>
            </tr>
            {% for r in results %}
            <tr class="{% if loop.index == 1 %}rank-1{% elif loop.index == 2 %}rank-2{% elif loop.index == 3 %}rank-3{% endif %}">
                <td>{{ loop.index }}</td>
                <td>{{ r.user_name }}</td>
                <td>{{ r.score }}/{{ r.total }}</td>
                <td>{{ "%.1f"|format(r.percentage) }}%</td>
            </tr>
            {% endfor %}
        </table>
        <a href="/student_dashboard" class="btn">Back to Dashboard</a>
    </div>
</body>
</html>
