<!DOCTYPE html>
<html>
<head>
    <title>Take Quiz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; }
        .timer { background: white; color: #667eea; padding: 15px; text-align: center; font-size: 28px; font-weight: bold; border-radius: 15px; margin-bottom: 20px; }
        .question-card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .q-text { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #2d3748; }
        .option { margin: 10px 0; padding: 10px; background: #f7f9fc; border-radius: 8px; cursor: pointer; }
        .option:hover { background: #e0e7ff; }
        .option.selected { background: #c6f6d5; border: 2px solid #48bb78; }
        input[type="radio"] { margin-right: 10px; cursor: pointer; }
        label { cursor: pointer; font-size: 16px; color: #4a5568; width: 90%; display: inline-block; }
        .submit-btn { width: 100%; padding: 15px; background: #48bb78; color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; margin-top: 20px; }
        .submit-btn:hover { background: #38a169; }
        .progress { background: white; border-radius: 10px; padding: 12px; margin-bottom: 20px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="timer">
            ⏱️ Time: <span id="timer">10:00</span>
        </div>
        
        <div class="progress" id="progress">
            📊 Progress: 0/<span id="totalCount">0</span> answered
        </div>
        
        <form action="/submit" method="POST" id="quizForm">
            {% for q in questions %}
            {% set q_index = loop.index0 %}
            <div class="question-card" data-qid="{{ q_index }}">
                <div class="q-text">Question {{ loop.index }}: {{ q.question }}</div>
                {% for opt in q.options %}
                <div class="option">
                    <input type="radio" name="answer_{{ q_index }}" value="{{ loop.index }}" id="q{{ q_index }}_{{ loop.index }}" onclick="updateProgress()">
                    <label for="q{{ q_index }}_{{ loop.index }}">{{ opt }}</label>
                </div>
                {% endfor %}
            </div>
            {% endfor %}
            
            <button type="submit" class="submit-btn">✅ Submit Quiz</button>
        </form>
    </div>
    
    <script>
        // Get total questions from the page
        var totalQuestions = document.querySelectorAll('.question-card').length;
        document.getElementById('totalCount').innerText = totalQuestions;
        
        // Timer
        let time = 600;
        const timerDisplay = document.getElementById('timer');
        const timerInterval = setInterval(function() {
            time--;
            let minutes = Math.floor(time / 60);
            let seconds = time % 60;
            if (seconds < 10) seconds = '0' + seconds;
            timerDisplay.innerHTML = minutes + ':' + seconds;
            if (time <= 0) {
                clearInterval(timerInterval);
                alert("Time's up! Submitting your quiz...");
                document.getElementById('quizForm').submit();
            }
        }, 1000);
        
        // Update progress function
        function updateProgress() {
            let answered = 0;
            
            for (let i = 0; i < totalQuestions; i++) {
                const radios = document.getElementsByName('answer_' + i);
                for (let j = 0; j < radios.length; j++) {
                    if (radios[j].checked) {
                        answered++;
                        break;
                    }
                }
            }
            
            const progressDiv = document.getElementById('progress');
            progressDiv.innerHTML = '📊 Progress: ' + answered + '/' + totalQuestions + ' answered';
            
            if (answered === totalQuestions) {
                progressDiv.style.background = '#c6f6d5';
                progressDiv.style.color = '#22543d';
            }
        }
        
        // Add click handlers to options for highlighting
        document.querySelectorAll('.option').forEach(function(option) {
            option.addEventListener('click', function() {
                const card = this.closest('.question-card');
                const options = card.querySelectorAll('.option');
                options.forEach(function(opt) {
                    opt.classList.remove('selected');
                });
                this.classList.add('selected');
            });
        });
        
        // Initial progress update
        updateProgress();
    </script>
</body>
</html>
